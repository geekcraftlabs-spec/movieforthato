<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Ms Lebona</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;600&display=swap');
        
        :root {
            --tw-color-primary: #ffd700;
        }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .title-font {
            font-family: 'Playfair Display', serif;
        }
        
        #timer-display {
            font-family: 'Playfair Display', serif;
            text-shadow: 
                0 0 20px rgb(255 215 0),
                0 0 40px rgb(255 215 0),
                0 0 60px rgb(255 215 0);
        }
        
        .message-text {
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { text-shadow: 0 0 20px rgb(255 215 0); }
            to { text-shadow: 0 0 40px rgb(255 215 0), 0 0 60px rgb(255 215 0); }
        }
        
        .canvas-container {
            transition: opacity 1s ease-in-out;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-[#1a0033] via-[#0f0022] to-[#000011] min-h-screen flex items-center justify-center overflow-hidden relative">
    
    <!-- Fireworks Canvas - behind everything -->
    <canvas id="fireworks-canvas" class="canvas-container absolute inset-0 pointer-events-none z-0 opacity-0"></canvas>

    <div class="relative z-10 max-w-4xl mx-auto text-center px-6 py-12">
        
        <!-- TIMER SECTION -->
        <div id="timer-section" class="transition-all duration-700">
            <div class="mb-8 flex justify-center">
                <div class="inline-flex items-center gap-2 bg-white/10 backdrop-blur-md px-6 py-2 rounded-3xl border border-white/20">
                    <div class="w-3 h-3 bg-[#ffd700] rounded-full animate-pulse"></div>
                    <p class="text-[#ffd700] text-sm tracking-[2px] font-medium uppercase">A special moment for Ms Lebona</p>
                </div>
            </div>
            
            <h1 class="title-font text-5xl md:text-6xl text-[#ffccaa] tracking-widest mb-6">
                THE SURPRISE STARTS IN...
            </h1>
            
            <!-- Big Timer -->
            <div id="timer-display" class="text-[9rem] md:text-[12rem] font-bold leading-none text-[#ffd700] flex items-baseline justify-center gap-4">
                <span id="minutes">00</span>
                <span class="text-7xl text-[#ffccaa]/60">:</span>
                <span id="seconds">00</span>
            </div>
            
            <p class="text-[#ffccaa]/70 text-xl md:text-2xl mt-4 tracking-wider">
                Get ready, princess... something beautiful is coming ✨
            </p>
        </div>

        <!-- SURPRISE SECTION (hidden until timer ends) -->
        <div id="surprise-section" class="hidden">
            
            <!-- Message -->
            <div class="mb-16">
                <h1 id="surprise-message" class="message-text title-font text-5xl md:text-7xl leading-tight text-[#ffd700] max-w-2xl mx-auto">
                    I have a surprise for you, Ms Lebona
                </h1>
                <div class="flex justify-center gap-8 mt-8 text-4xl">
                    <span class="animate-bounce">💖</span>
                    <span class="animate-bounce delay-150">✨</span>
                    <span class="animate-bounce delay-300">💖</span>
                </div>
            </div>

            <!-- Proceed Button (hidden for first 5 seconds of fireworks) -->
            <div id="button-container" class="hidden">
                <a id="proceed-link"
                   href="YOUR_GOOGLE_DRIVE_LINK_HERE"
                   target="_blank"
                   class="group inline-flex items-center justify-center gap-4 bg-gradient-to-r from-[#ffd700] to-[#ffaa00] hover:from-[#ffea80] hover:to-[#ffd700] text-[#1a0033] text-3xl font-semibold px-16 py-7 rounded-3xl shadow-[0_0_60px_-10px] shadow-[#ffd700] transition-all duration-300 hover:scale-110 active:scale-95">
                    <span class="tracking-widest">SELECT THIS HERE TO PROCEED</span>
                    <span class="text-5xl transition-transform group-hover:translate-x-3">→</span>
                </a>
                
                <p class="text-[#ffccaa]/60 text-sm mt-8 tracking-widest">A movie just for you, my princess ❤️</p>
            </div>
        </div>
    </div>

    <script>
        // ====================== CONFIGURATION ======================
        // CHANGE THIS to how many seconds the countdown should run
        const COUNTDOWN_DURATION = 15; // ←←← Change this number (e.g. 30, 60, 120)

        // Your Google Drive link - REPLACE THIS!
        const GOOGLE_DRIVE_LINK = "YOUR_GOOGLE_DRIVE_LINK_HERE";
        // Example: "https://drive.google.com/file/d/1abc.../view?usp=sharing"
        // Make sure the file is set to "Anyone with the link" can view

        // ====================== TAILWIND SETUP ======================
        function initTailwind() {
            return {
                config(userConfig = {}) {
                    return {
                        content: [],
                        theme: { extend: {} },
                        plugins: [],
                        ...userConfig,
                    };
                },
                theme: { extend: {} },
            };
        }

        // ====================== FIREWORKS ENGINE ======================
        let canvas, ctx;
        let fireworks = [];
        let particles = [];
        let animationFrameId;
        let fireworksActive = false;

        class Firework {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 20;
                this.vy = -(Math.random() * 9 + 11); // strong upward launch
                this.color = this.randomColor();
                this.exploded = false;
                this.trail = [];
            }
            
            randomColor() {
                const colors = [
                    '#ff69b4', '#ffd700', '#ff00ff', 
                    '#00ffff', '#ffaa00', '#ba55d3', '#ffffff'
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }
            
            update() {
                if (this.exploded) return;
                
                // trail
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 18) this.trail.shift();
                
                this.y += this.vy;
                this.vy += 0.18; // gentle gravity
                
                // explode when velocity turns downward
                if (this.vy >= -2) {
                    this.explode();
                }
            }
            
            explode() {
                this.exploded = true;
                const particleCount = 68;
                for (let i = 0; i < particleCount; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 7.5 + 3.5;
                    particles.push({
                        x: this.x,
                        y: this.y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 3,
                        life: 95 + Math.random() * 35,
                        color: this.color,
                        size: Math.random() * 5 + 2.5,
                        gravity: 0.12
                    });
                }
            }
            
            draw() {
                if (this.exploded) return;
                
                ctx.save();
                ctx.shadowBlur = 25;
                ctx.shadowColor = this.color;
                
                // draw trail
                for (let i = 0; i < this.trail.length; i++) {
                    const alpha = (i + 1) / this.trail.length;
                    ctx.globalAlpha = alpha * 0.7;
                    ctx.fillStyle = this.color;
                    ctx.fillRect(this.trail[i].x - 3, this.trail[i].y - 3, 6, 6);
                }
                
                // rocket head
                ctx.globalAlpha = 1;
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(this.x - 4, this.y - 8, 8, 16);
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x - 3, this.y - 6, 6, 12);
                ctx.restore();
            }
        }

        function createParticleBurst(x, y, color) {
            // extra burst effect when needed
            for (let i = 0; i < 25; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 4 + 2;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 2,
                    life: 60,
                    color: color,
                    size: Math.random() * 3 + 1.5,
                    gravity: 0.08
                });
            }
        }

        function updateAndDrawFireworks() {
            if (!fireworksActive && fireworks.length === 0 && particles.length === 0) {
                cancelAnimationFrame(animationFrameId);
                return;
            }
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Update & draw fireworks (rockets)
            for (let i = fireworks.length - 1; i >= 0; i--) {
                const fw = fireworks[i];
                fw.update();
                fw.draw();
                if (fw.exploded) fireworks.splice(i, 1);
            }
            
            // Update & draw particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += p.gravity;
                p.vx *= 0.975;
                p.vy *= 0.975;
                p.life--;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }
                
                const alpha = p.life / 100;
                ctx.save();
                ctx.globalAlpha = alpha * 0.95;
                ctx.shadowBlur = 12;
                ctx.shadowColor = p.color;
                ctx.fillStyle = p.color;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
            
            animationFrameId = requestAnimationFrame(updateAndDrawFireworks);
        }

        function launchRandomFirework() {
            if (!fireworksActive) return;
            fireworks.push(new Firework());
        }

        function startFireworks() {
            fireworksActive = true;
            fireworks = [];
            particles = [];
            
            const canvasEl = document.getElementById('fireworks-canvas');
            canvasEl.style.opacity = '1';
            
            // Initial big launch
            for (let i = 0; i < 8; i++) {
                setTimeout(() => launchRandomFirework(), i * 70);
            }
            
            // Continuous fireworks for exactly 5 seconds
            const launchTimer = setInterval(() => {
                if (!fireworksActive) {
                    clearInterval(launchTimer);
                    return;
                }
                launchRandomFirework();
            }, 110);
            
            // Stop launching new fireworks after 5 seconds
            setTimeout(() => {
                clearInterval(launchTimer);
            }, 5000);
            
            // Keep the canvas visible a little longer, then fade out
            setTimeout(() => {
                let opacity = 1;
                const fadeInterval = setInterval(() => {
                    opacity -= 0.08;
                    canvasEl.style.opacity = opacity;
                    if (opacity <= 0) {
                        clearInterval(fadeInterval);
                        fireworksActive = false;
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                    }
                }, 40);
            }, 6200);
            
            // Start the animation loop
            updateAndDrawFireworks();
        }

        // ====================== COUNTDOWN TIMER ======================
        let countdownInterval;
        let timeLeft = COUNTDOWN_DURATION;

        function updateTimerUI() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            
            document.getElementById('minutes').textContent = minutes.toString().padStart(2, '0');
            document.getElementById('seconds').textContent = seconds.toString().padStart(2, '0');
        }

        function triggerSurprise() {
            // Hide timer section
            const timerSection = document.getElementById('timer-section');
            timerSection.style.opacity = '0';
            setTimeout(() => {
                timerSection.classList.add('hidden');
            }, 700);
            
            // Show surprise section
            const surpriseSection = document.getElementById('surprise-section');
            surpriseSection.classList.remove('hidden');
            surpriseSection.style.opacity = '0';
            setTimeout(() => {
                surpriseSection.style.transition = 'opacity 1.2s ease';
                surpriseSection.style.opacity = '1';
            }, 300);
            
            // START THE FIREWORKS!
            startFireworks();
            
            // Show the button after exactly 5 seconds of fireworks
            setTimeout(() => {
                document.getElementById('button-container').classList.remove('hidden');
                document.getElementById('button-container').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('button-container').style.transition = 'opacity 1s ease';
                    document.getElementById('button-container').style.opacity = '1';
                }, 100);
            }, 5000);
        }

        // ====================== MAIN APP START ======================
        function startApp() {
            // Tailwind
            initTailwind();
            
            // Canvas setup
            canvas = document.getElementById('fireworks-canvas');
            ctx = canvas.getContext('2d');
            
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
            
            // Set the Google Drive link
            const linkElement = document.getElementById('proceed-link');
            if (GOOGLE_DRIVE_LINK !== "YOUR_GOOGLE_DRIVE_LINK_HERE") {
                linkElement.href = GOOGLE_DRIVE_LINK;
            } else {
                console.warn("%c⚠️  Don't forget to replace YOUR_GOOGLE_DRIVE_LINK_HERE with your real Google Drive link!", "color:#ffd700; font-size:13px");
            }
            
            // Start countdown
            updateTimerUI();
            countdownInterval = setInterval(() => {
                timeLeft--;
                updateTimerUI();
                
                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    triggerSurprise();
                }
            }, 1000);
            
            console.log('%c🎉 Website ready for Ms Lebona! Timer set to ' + COUNTDOWN_DURATION + ' seconds.', 'color:#ffd700; font-family:monospace');
        }
        
        // Launch everything when page loads
        window.onload = startApp;
    </script>
</body>
</html>
