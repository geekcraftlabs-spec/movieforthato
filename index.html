<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Ms Lebona ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;600&display=swap');
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .title-font {
            font-family: 'Playfair Display', serif;
        }
        
        #timer-display {
            font-family: 'Playfair Display', serif;
            text-shadow: 0 0 30px rgba(255, 105, 180, 0.8);
        }
        
        .message-text {
            animation: soft-glow 3s ease-in-out infinite alternate;
        }
        
        @keyframes soft-glow {
            from { text-shadow: 0 0 20px #ff69b4, 0 0 40px #ff1493; }
            to { text-shadow: 0 0 35px #ff69b4, 0 0 60px #ff1493; }
        }
        
        .bouquet-container {
            animation: bouquet-pop 0.8s ease-out forwards;
        }
        
        @keyframes bouquet-pop {
            0% { opacity: 0; transform: scale(0.6) translateY(40px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        .canvas-container {
            transition: opacity 1.2s ease-in-out;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-[#1a0f1f] via-[#2a1525] to-[#11080f] min-h-screen flex items-center justify-center overflow-hidden relative">
    
    <!-- Fireworks Canvas -->
    <canvas id="fireworks-canvas" class="canvas-container absolute inset-0 pointer-events-none z-0 opacity-0"></canvas>

    <div class="relative z-10 max-w-4xl mx-auto text-center px-6 py-12">
        
        <!-- TIMER SECTION -->
        <div id="timer-section" class="transition-all duration-700">
            <div class="mb-8 flex justify-center">
                <div class="inline-flex items-center gap-2 bg-white/10 backdrop-blur-md px-6 py-2 rounded-3xl border border-white/20">
                    <div class="w-3 h-3 bg-[#ff69b4] rounded-full animate-pulse"></div>
                    <p class="text-[#ffb6c1] text-sm tracking-[2px] font-medium uppercase">A special moment for Ms Lebona</p>
                </div>
            </div>
            
            <h1 class="title-font text-5xl md:text-6xl text-[#ffe4e1] tracking-widest mb-6">
                THE SURPRISE STARTS IN...
            </h1>
            
            <div id="timer-display" class="text-[9rem] md:text-[12rem] font-bold leading-none text-[#ff69b4] flex items-baseline justify-center gap-4">
                <span id="minutes">00</span>
                <span class="text-7xl text-[#ffb6c1]/70">:</span>
                <span id="seconds">00</span>
            </div>
            
            <p class="text-[#ffe4e1]/80 text-xl md:text-2xl mt-4 tracking-wider">
                Get ready, my princess... something beautiful awaits 🌸
            </p>
        </div>

        <!-- BOUQUET REVEAL (shows for ~3 seconds) -->
        <div id="bouquet-section" class="hidden absolute inset-0 flex items-center justify-center z-20">
            <div class="bouquet-container text-center">
                <div class="max-w-md mx-auto">
                    <img id="bouquet-image" 
                         src="whiterosesthato.jpg" 
                         alt="Bouquet of white roses, pink lilies and red roses"
                         class="rounded-3xl shadow-2xl shadow-[#ff1493]/30 mx-auto max-h-[420px] object-contain">
                </div>
                <p class="text-[#ffe4e1] text-2xl title-font mt-8 tracking-wider">For you, Ms Lebona 💐</p>
            </div>
        </div>

        <!-- SURPRISE SECTION -->
        <div id="surprise-section" class="hidden">
            <!-- Message -->
            <div class="mb-16">
                <h1 id="surprise-message" class="message-text title-font text-5xl md:text-7xl leading-tight text-[#ffe4e1] max-w-2xl mx-auto">
                    I have a surprise for you, Ms Lebona
                </h1>
                <div class="flex justify-center gap-8 mt-8 text-4xl">
                    <span class="animate-bounce text-[#ff69b4]">🌹</span>
                    <span class="animate-bounce delay-150 text-[#ffb6c1]">🌸</span>
                    <span class="animate-bounce delay-300 text-[#ff1493]">💐</span>
                </div>
            </div>

            <!-- Proceed Button (appears after fireworks) -->
            <div id="button-container" class="hidden">
                <a id="proceed-link"
                   href="https://photos.app.goo.gl/Xg2tWucZe5eAaUVf6"
                   target="_blank"
                   class="group inline-flex items-center justify-center gap-4 bg-gradient-to-r from-[#ff69b4] via-[#ff1493] to-[#c71585] hover:brightness-110 text-white text-3xl font-semibold px-16 py-7 rounded-3xl shadow-[0_0_60px_-10px] shadow-[#ff69b4] transition-all duration-300 hover:scale-110 active:scale-95">
                    <span class="tracking-widest">SELECT THIS HERE TO PROCEED</span>
                    <span class="text-5xl transition-transform group-hover:translate-x-3">→</span>
                </a>
                
                <p class="text-[#ffe4e1]/70 text-sm mt-8 tracking-widest">A movie just for you, my princess ❤️</p>
            </div>
        </div>
    </div>

    <script>
        // ====================== CONFIGURATION ======================
        const COUNTDOWN_DURATION = 15; // Change this to any number of seconds you want

        // Replace with your actual Google Drive link
        const GOOGLE_DRIVE_LINK = "YOUR_GOOGLE_DRIVE_LINK_HERE";

        // ====================== FIREWORKS (unchanged but colors adjusted) ======================
        let canvas, ctx;
        let fireworks = [];
        let particles = [];
        let animationFrameId;
        let fireworksActive = false;

        class Firework {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 20;
                this.vy = -(Math.random() * 9 + 11);
                this.color = this.randomColor();
                this.exploded = false;
                this.trail = [];
            }
            
            randomColor() {
                const colors = ['#ff69b4', '#ffb6c1', '#ff1493', '#ff85a2', '#ffffff', '#c71585'];
                return colors[Math.floor(Math.random() * colors.length)];
            }
            
            update() { /* same as before */ 
                if (this.exploded) return;
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 18) this.trail.shift();
                this.y += this.vy;
                this.vy += 0.18;
                if (this.vy >= -2) this.explode();
            }
            
            explode() {
                this.exploded = true;
                const particleCount = 68;
                for (let i = 0; i < particleCount; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 7.5 + 3.5;
                    particles.push({
                        x: this.x, y: this.y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 3,
                        life: 95 + Math.random() * 35,
                        color: this.color,
                        size: Math.random() * 5 + 2.5,
                        gravity: 0.12
                    });
                }
            }
            
            draw() { /* same as before */ 
                if (this.exploded) return;
                ctx.save();
                ctx.shadowBlur = 25;
                ctx.shadowColor = this.color;
                for (let i = 0; i < this.trail.length; i++) {
                    const alpha = (i + 1) / this.trail.length;
                    ctx.globalAlpha = alpha * 0.7;
                    ctx.fillStyle = this.color;
                    ctx.fillRect(this.trail[i].x - 3, this.trail[i].y - 3, 6, 6);
                }
                ctx.globalAlpha = 1;
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(this.x - 4, this.y - 8, 8, 16);
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x - 3, this.y - 6, 6, 12);
                ctx.restore();
            }
        }

        function updateAndDrawFireworks() {
            if (!fireworksActive && fireworks.length === 0 && particles.length === 0) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = fireworks.length - 1; i >= 0; i--) {
                fireworks[i].update();
                fireworks[i].draw();
                if (fireworks[i].exploded) fireworks.splice(i, 1);
            }
            
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += p.gravity;
                p.vx *= 0.975; p.vy *= 0.975;
                p.life--;
                if (p.life <= 0) { particles.splice(i, 1); continue; }
                const alpha = p.life / 100;
                ctx.save();
                ctx.globalAlpha = alpha * 0.95;
                ctx.shadowBlur = 12;
                ctx.shadowColor = p.color;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
            animationFrameId = requestAnimationFrame(updateAndDrawFireworks);
        }

        function launchRandomFirework() {
            if (!fireworksActive) return;
            fireworks.push(new Firework());
        }

        function startFireworks() {
            fireworksActive = true;
            const canvasEl = document.getElementById('fireworks-canvas');
            canvasEl.style.opacity = '1';
            
            for (let i = 0; i < 8; i++) setTimeout(launchRandomFirework, i * 70);
            
            const launchTimer = setInterval(() => {
                if (!fireworksActive) { clearInterval(launchTimer); return; }
                launchRandomFirework();
            }, 110);
            
            setTimeout(() => clearInterval(launchTimer), 5000);
            
            setTimeout(() => {
                let opacity = 1;
                const fade = setInterval(() => {
                    opacity -= 0.08;
                    canvasEl.style.opacity = opacity;
                    if (opacity <= 0) {
                        clearInterval(fade);
                        fireworksActive = false;
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                    }
                }, 40);
            }, 6200);
            
            updateAndDrawFireworks();
        }

        // ====================== COUNTDOWN + FLOW ======================
        let timeLeft = COUNTDOWN_DURATION;
        let countdownInterval;

        function updateTimerUI() {
            const min = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const sec = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('minutes').textContent = min;
            document.getElementById('seconds').textContent = sec;
        }

        function showBouquet() {
            const bouquetSection = document.getElementById('bouquet-section');
            const timerSection = document.getElementById('timer-section');
            
            timerSection.style.opacity = '0';
            setTimeout(() => timerSection.classList.add('hidden'), 700);
            
            bouquetSection.classList.remove('hidden');
            bouquetSection.style.opacity = '1';
            
            // Hide bouquet after 3 seconds and show surprise + start fireworks
            setTimeout(() => {
                bouquetSection.style.transition = 'opacity 4.2s ease';
                bouquetSection.style.opacity = '0';
                
                setTimeout(() => {
                    bouquetSection.classList.add('hidden');
                    
                    // Show surprise message
                    const surpriseSection = document.getElementById('surprise-section');
                    surpriseSection.classList.remove('hidden');
                    surpriseSection.style.opacity = '1';
                    
                    // Start fireworks
                    startFireworks();
                    
                    // Show button after 5 seconds
                    setTimeout(() => {
                        const btnContainer = document.getElementById('button-container');
                        btnContainer.classList.remove('hidden');
                        btnContainer.style.opacity = '1';
                    }, 5000);
                }, 1200);
            }, 3000);
        }

        function triggerSurprise() {
            showBouquet();
        }

        function startApp() {
            // Canvas setup
            canvas = document.getElementById('fireworks-canvas');
            ctx = canvas.getContext('2d');
            
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
            
            // Set Google Drive link
            const linkEl = document.getElementById('proceed-link');
            if (GOOGLE_DRIVE_LINK !== "YOUR_GOOGLE_DRIVE_LINK_HERE") {
                linkEl.href = GOOGLE_DRIVE_LINK;
            }
            
            // Start countdown
            updateTimerUI();
            countdownInterval = setInterval(() => {
                timeLeft--;
                updateTimerUI();
                if (timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    triggerSurprise();
                }
            }, 1000);
        }
        
        window.onload = startApp;
    </script>
</body>
</html>
